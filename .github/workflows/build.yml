name: Build Android APK

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'app/**'
      - 'gradle/**'
      - '*.gradle.kts'
      - 'gradlew'
      - '.github/workflows/build.yml'
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build Debug APK
        if: github.event.inputs.build_type != 'release'
        run: ./gradlew assembleDebug --stacktrace

      - name: Build Release APK
        if: github.event.inputs.build_type == 'release'
        run: ./gradlew assembleRelease --stacktrace

      - name: Get APK info (Debug)
        if: github.event.inputs.build_type != 'release'
        run: |
          APK_PATH=$(find app/build/outputs/apk/debug -name "*.apk" | head -1)
          APK_NAME=$(basename "$APK_PATH")
          APK_SIZE=$(du -h "$APK_PATH" | cut -f1)
          echo "APK_PATH=$APK_PATH" >> $GITHUB_ENV
          echo "APK_NAME=$APK_NAME" >> $GITHUB_ENV
          echo "APK_SIZE=$APK_SIZE" >> $GITHUB_ENV
          echo "APK Name: $APK_NAME"
          echo "APK Size: $APK_SIZE"

      - name: Get APK info (Release)
        if: github.event.inputs.build_type == 'release'
        run: |
          APK_PATH=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          APK_NAME=$(basename "$APK_PATH")
          APK_SIZE=$(du -h "$APK_PATH" | cut -f1)
          echo "APK_PATH=$APK_PATH" >> $GITHUB_ENV
          echo "APK_NAME=$APK_NAME" >> $GITHUB_ENV
          echo "APK_SIZE=$APK_SIZE" >> $GITHUB_ENV
          echo "APK Name: $APK_NAME"
          echo "APK Size: $APK_SIZE"

      - name: Upload Debug APK
        if: github.event.inputs.build_type != 'release'
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-${{ github.run_number }}
          path: ${{ env.APK_PATH }}
          retention-days: 30

      - name: Upload Release APK
        if: github.event.inputs.build_type == 'release'
        uses: actions/upload-artifact@v4
        with:
          name: app-release-${{ github.run_number }}
          path: ${{ env.APK_PATH }}
          retention-days: 90

      - name: Create Release (for release builds)
        if: github.event.inputs.build_type == 'release' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Release v1.0.${{ github.run_number }}
          body: |
            ## AdoetzGPT Enhanced - v1.0.${{ github.run_number }}

            ### APK Information
            - **Name**: ${{ env.APK_NAME }}
            - **Size**: ${{ env.APK_SIZE }}
            - **Build**: ${{ github.run_number }}

            ### Changes
            Built from commit: ${{ github.sha }}

            ### Download
            Download the APK from the assets below.
          files: ${{ env.APK_PATH }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Summary
        run: |
          echo "## ✅ Build Successful!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📱 APK Information" >> $GITHUB_STEP_SUMMARY
          echo "- **Name**: ${{ env.APK_NAME }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Size**: ${{ env.APK_SIZE }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Build**: ${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📥 Download" >> $GITHUB_STEP_SUMMARY
          echo "Check the artifacts section below to download the APK." >> $GITHUB_STEP_SUMMARY
